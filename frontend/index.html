<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNIK ERP</title>
    <script>
      // Load persisted app name before React mounts, for instant correct tab title
      try {
        var stored = localStorage.getItem("unik-app-name");
        if (stored) document.title = stored;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
